services:
  survey:
    build: .
    image: survey-dd:latest
    container_name: survey_dd
    env_file:
      - .env
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SURVEY_URL=${SURVEY_URL}
      - TIMEOUT=${TIMEOUT:-30}
      - MAX_PAGES=${MAX_PAGES:-500}
    volumes:
      - ./strategies:/app/strategies
      - survey-data:/app/.omo
    restart: on-failure
    networks:
      - survey-net

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - survey-net

volumes:
  jenkins-data:
  survey-data:

networks:
  survey-net:
