services:
  survey:
    build: .
    image: survey-dd:latest
    container_name: survey_dd
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SURVEY_URL=${SURVEY_URL}
    command: >
      sh -c '
        if [ -n "$$SURVEY_URL" ]; then
          echo "Running survey: $$SURVEY_URL";
          survey-auto -u "$$SURVEY_URL" --self-improve --timeout 30 --max-pages 500 --verbose
        else
          echo "SURVEY_URL not set. Usage: SURVEY_URL=... docker compose up survey";
          survey-auto --help
        fi
      '
    volumes:
      - ./strategies:/app/strategies
      - survey-data:/app/.omo
    networks:
      - survey-net

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - survey-net

volumes:
  jenkins-data:
  survey-data:

networks:
  survey-net:
